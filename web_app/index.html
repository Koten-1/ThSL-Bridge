<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThSL Bridge — แปลภาษามือไทยเรียลไทม์</title>
<style>
  :root { --bg:#0f1115; --accent:#2ecc71; --gold:#f1c40f; --text:#e8eaed; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text);
         display:flex; flex-direction:column; align-items:center; min-height:100vh; padding-bottom:30px; }
  h1 { margin:14px 0 2px; font-size:1.5rem; }
  .sub { color:#9aa0a6; font-size:.85rem; margin-bottom:10px; }

  .stage { position:relative; width:960px; max-width:97vw; }
  video, canvas { width:100%; border-radius:16px; display:block; }
  canvas { position:absolute; top:0; left:0; }

  #status { position:absolute; top:12px; left:12px; background:rgba(0,0,0,.5);
            backdrop-filter:blur(6px); padding:7px 14px; border-radius:10px; font-size:.95rem; }
  #big { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
         font-size:9rem; font-weight:800; color:var(--gold); text-shadow:0 6px 30px rgba(0,0,0,.8); }

  /* word result — overlay bottom center, semi-transparent */
  #result { position:absolute; bottom:58px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,.45); backdrop-filter:blur(6px); padding:10px 30px; border-radius:14px;
            font-size:2.6rem; font-weight:800; color:var(--gold); white-space:nowrap; }
  #sentence { position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
              background:rgba(0,0,0,.4); backdrop-filter:blur(4px); padding:5px 18px; border-radius:10px;
              font-size:1.05rem; color:#fff; white-space:nowrap; max-width:90%; overflow:hidden; }

  /* estimation bars — overlay right side, semi-transparent */
  .bars { position:absolute; right:12px; top:50%; transform:translateY(-50%);
          width:230px; background:rgba(15,17,21,.55); backdrop-filter:blur(8px);
          padding:14px 14px; border-radius:14px; }
  .bar-row { display:flex; align-items:center; gap:8px; margin:6px 0; }
  .bar-label { width:74px; text-align:right; font-size:.85rem; }
  .bar-track { flex:1; background:rgba(255,255,255,.12); border-radius:6px; height:16px; overflow:hidden; }
  .bar-fill { height:100%; background:var(--accent); width:0%; transition:width .15s; }
  .bar-pct { width:38px; font-size:.8rem; text-align:right; }

  button { background:var(--accent); color:#08160d; border:none; padding:12px 30px;
           border-radius:10px; font-size:1.05rem; font-weight:700; cursor:pointer; margin:14px; }
  .hint { color:#9aa0a6; font-size:.85rem; max-width:680px; text-align:center; line-height:1.5; margin:6px 14px; }
  .counter { color:var(--gold); font-weight:700; }
</style>
</head>
<body>
  <h1>🤟 ThSL Bridge</h1>
  <div class="sub">แปลภาษามือไทยเรียลไทม์ในเบราว์เซอร์ • MediaPipe + LSTM</div>

  <button id="startBtn">เริ่มกล้อง</button>

  <div class="stage">
    <video id="video" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
    <div id="status">กำลังโหลด...</div>
    <div id="big"></div>
    <div class="bars" id="bars"></div>
    <div id="result">—</div>
    <div id="sentence"></div>
  </div>

  <p class="hint">
    ยกมือ → รอนับ 3-2-1 → ทำท่า → <b>ค้างนิ่ง</b> เพื่อยืนยันคำ<br>
    รองรับ 10 คำ: คนหูหนวก, คุณ, ช่วย, ขอบคุณ, ฉัน, ต้องการ, เข้าใจ, ไม่, ถาม, บอก
  </p>
  <p class="hint">ทำนายไปแล้ว <span class="counter" id="counter">0</span> ครั้ง</p>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

const TARGET_SIGNS = ["คนหูหนวก","คุณ","ช่วย","ขอบคุณ","ฉัน","ต้องการ","เข้าใจ","ไม่","ถาม","บอก","finish","none"];
const THRESH = {"คนหูหนวก":0.70,"คุณ":0.60,"ช่วย":0.65,"ขอบคุณ":0.80,"ฉัน":0.75,"ต้องการ":0.78,
  "เข้าใจ":0.85,"ไม่":0.65,"ถาม":0.70,"บอก":0.75,"finish":0.70,"none":0.80};
const COLLECT_FRAMES=30, STILL_THRESHOLD=0.03, STILL_FRAMES=6, MIN_COLLECT=10, MAX_COLLECT=150, IDLE_WARMUP=4, MISSING_TOL=8;

const video=document.getElementById("video"), overlay=document.getElementById("overlay");
const ctx=overlay.getContext("2d");
const statusEl=document.getElementById("status"), resultEl=document.getElementById("result");
const sentenceEl=document.getElementById("sentence"), barsEl=document.getElementById("bars");
const counterEl=document.getElementById("counter"), bigEl=document.getElementById("big");

let handLandmarker=null, model=null;
let state="IDLE", idleC=0, stillC=0, missC=0, collected=[], prevKp=null;
let wordBuffer=[], predCount=0, countdownStart=0;

function buildBars(){ for(let i=0;i<5;i++){ const r=document.createElement("div"); r.className="bar-row";
  r.innerHTML=`<div class="bar-label" id="bl${i}"></div><div class="bar-track"><div class="bar-fill" id="bf${i}"></div></div><div class="bar-pct" id="bp${i}"></div>`; barsEl.appendChild(r);} }
buildBars();

async function init(){
  statusEl.textContent="โหลดโมเดล...";
  const vision=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
  handLandmarker=await HandLandmarker.createFromOptions(vision,{
    baseOptions:{modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"},
    runningMode:"VIDEO", numHands:2 });

  model=tf.sequential();
  model.add(tf.layers.lstm({units:32, returnSequences:true, inputShape:[30,126]}));
  model.add(tf.layers.dropout({rate:0.5}));
  model.add(tf.layers.lstm({units:32}));
  model.add(tf.layers.dropout({rate:0.5}));
  model.add(tf.layers.dense({units:16, activation:"relu"}));
  model.add(tf.layers.dense({units:12, activation:"softmax"}));

  const wjson=await (await fetch("weights.json")).json();
  model.setWeights(wjson.map(w=>tf.tensor(w.data, w.shape)));
  statusEl.textContent="พร้อม! ยกมือได้เลย";
}

document.getElementById("startBtn").onclick=async()=>{
  const stream=await navigator.mediaDevices.getUserMedia({video:{width:1280,height:720}});
  video.srcObject=stream;
  video.onloadedmetadata=()=>{ overlay.width=video.videoWidth; overlay.height=video.videoHeight; loop(); };
  document.getElementById("startBtn").style.display="none";
};

function extractKeypoints(res){
  const lh=new Float32Array(63), rh=new Float32Array(63);
  let present=false;
  if(res.landmarks && res.landmarks.length>0){
    present=true;
    for(let h=0; h<res.landmarks.length; h++){
      const lm=res.landmarks[h];
      const label=res.handednesses[h][0].categoryName;
      const target=(label==="Left")?lh:rh;
      for(let i=0;i<21;i++){ target[i*3]=lm[i].x; target[i*3+1]=lm[i].y; target[i*3+2]=lm[i].z; }
    }
  }
  const row=new Float32Array(126); row.set(lh,0); row.set(rh,63);
  return {row, present};
}

function meanAbsDelta(a,b){ let s=0; for(let i=0;i<126;i++) s+=Math.abs(a[i]-b[i]); return s/126; }

function resample30(frames){
  const n=frames.length, out=[];
  for(let i=0;i<COLLECT_FRAMES;i++){ out.push(frames[Math.round(i*(n-1)/(COLLECT_FRAMES-1))]); }
  return out;
}

async function predict(seq){
  const flat=new Float32Array(30*126);
  for(let i=0;i<30;i++) flat.set(seq[i], i*126);
  const input=tf.tensor(flat,[1,30,126]);
  const out=model.predict(input);
  const data=await out.data();
  input.dispose(); out.dispose();
  return data;
}

function showBars(probs){
  const ranked=[...probs.keys()].sort((a,b)=>probs[b]-probs[a]).slice(0,5);
  ranked.forEach((idx,i)=>{
    const s=TARGET_SIGNS[idx];
    document.getElementById("bl"+i).textContent=(s==="none"?"—":s);
    document.getElementById("bf"+i).style.width=(probs[idx]*100)+"%";
    document.getElementById("bp"+i).textContent=Math.round(probs[idx]*100)+"%";
  });
}

async function onComplete(seq){
  const probs=await predict(seq);
  showBars(probs);
  let best=0; for(let i=1;i<12;i++) if(probs[i]>probs[best]) best=i;
  const sign=TARGET_SIGNS[best], conf=probs[best];
  predCount++; counterEl.textContent=predCount;
  if(sign==="finish"){
    if(wordBuffer.length){ sentenceEl.textContent="ประโยค: "+wordBuffer.join(" "); wordBuffer=[]; }
    resultEl.textContent="✓ จบประโยค"; return;
  }
  if(sign!=="none" && conf>=(THRESH[sign]||0.8)){
    if(!wordBuffer.length || wordBuffer[wordBuffer.length-1]!==sign){
      wordBuffer.push(sign);
      resultEl.textContent=sign+" "+Math.round(conf*100)+"%";
      sentenceEl.textContent="กำลังสร้าง: "+wordBuffer.join(" ");
    }
  } else { resultEl.textContent="—"; }
}

function drawHands(res){
  ctx.clearRect(0,0,overlay.width,overlay.height);
  if(!res.landmarks) return;
  for(const lm of res.landmarks){
    ctx.fillStyle="#2ecc71";
    for(const p of lm){ ctx.beginPath(); ctx.arc(p.x*overlay.width, p.y*overlay.height, 5, 0, 2*Math.PI); ctx.fill(); }
  }
}

let lastTs=-1;
async function loop(){
  if(handLandmarker && video.readyState>=2){
    const ts=performance.now();
    if(ts!==lastTs){
      lastTs=ts;
      const res=handLandmarker.detectForVideo(video, ts);
      drawHands(res);
      const {row, present}=extractKeypoints(res);

      if(state==="IDLE"){
        if(present){ idleC++; statusEl.textContent="✋ จับมือได้แล้ว..."; if(idleC>=IDLE_WARMUP){ state="COUNTDOWN"; countdownStart=performance.now(); } }
        else { idleC=0; statusEl.textContent="ยกมือให้กล้องเห็น"; }
      } else if(state==="COUNTDOWN"){
        if(!present){ state="IDLE"; idleC=0; bigEl.textContent=""; statusEl.textContent="พร้อม"; }
        else {
          const remain=3-(performance.now()-countdownStart)/1000;
          if(remain<=0){ state="COLLECTING"; collected=[]; stillC=0; missC=0; prevKp=null; bigEl.textContent=""; statusEl.textContent="🟢 ทำท่าเลย!"; }
          else { bigEl.textContent=Math.ceil(remain); statusEl.textContent="เตรียมตัว..."; }
        }
      } else {
        let trigger=false;
        if(present){
          missC=0; collected.push(row);
          if(prevKp && collected.length>=MIN_COLLECT){
            const d=meanAbsDelta(row,prevKp);
            if(d<STILL_THRESHOLD) stillC++; else stillC=0;
            if(stillC>=STILL_FRAMES) trigger=true;
          }
          prevKp=row;
        } else { missC++; }
        if(missC>=MISSING_TOL || collected.length>=MAX_COLLECT){
          if(collected.length>=MIN_COLLECT) trigger=true;
          else { state="IDLE"; idleC=0; collected=[]; statusEl.textContent="พร้อม"; }
        }
        if(trigger){
          onComplete(resample30(collected));
          state="IDLE"; idleC=0; collected=[]; stillC=0; missC=0; prevKp=null; statusEl.textContent="พร้อม";
        } else if(state==="COLLECTING"){ statusEl.textContent="🟢 เก็บท่า "+collected.length; }
      }
    }
  }
  requestAnimationFrame(loop);
}

init();
</script>
</body>
</html>
